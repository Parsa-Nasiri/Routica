name: Build APK

# Builds a signed release APK and uploads it as a downloadable artifact.
# The keystore is committed to the repo for consistent signing across
# all builds (CI + local), so updates install without uninstalling.
# versionCode auto-increments via github.run_number.
on:
  push:
    branches: [main, master, "devin/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.35.0"
  # Google OAuth Web Client ID — passed to Flutter via --dart-define.
  # Set this as a repository secret in GitHub Settings → Secrets and Variables → Actions.
  GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}

jobs:
  build-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze
        continue-on-error: true

      - name: Build universal release APK (auto versionCode)
        run: flutter build apk --release --build-number=${{ github.run_number }} --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID

      - name: Build per-ABI release APKs (auto versionCode)
        run: flutter build apk --release --split-per-abi --build-number=${{ github.run_number }} --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID

      - name: Upload universal APK
        uses: actions/upload-artifact@v4
        with:
          name: routica-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload per-ABI APKs
        uses: actions/upload-artifact@v4
        with:
          name: routica-release-apk-split
          path: build/app/outputs/flutter-apk/app-*-release.apk
          if-no-files-found: error
          retention-days: 30
